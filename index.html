<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTMASTER PRO v1.2 | FULL VERSION</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg:#020617; --card:#111827; --accent:#22c55e; --text:#94a3b8; --border:#334155; --pro:#f59e0b; }
body{margin:0;font-family: Arial, sans-serif;background:var(--bg);color:white;padding-bottom:50px;}
header{text-align:center;padding:25px;background:#0f172a;border-bottom:4px solid var(--pro);}
header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
header p { margin: 5px 0 0 0; color: var(--pro); font-weight: bold; font-size: 0.8rem; text-transform: uppercase;}
.container{max-width:1100px;margin:auto;padding:10px;}
.card{background:var(--card);padding:15px;border-radius:12px;margin-top:15px;border:1px solid var(--border);}
h3{margin-top:0;color:var(--accent);font-size:1rem;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:10px;}
input,select{width:100%;padding:8px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:4px;box-sizing: border-box;font-size:0.85rem;}
button{width:100%;padding:15px;margin-top:15px;background:var(--accent);border:none;font-weight:bold;cursor:pointer;border-radius:4px;font-size:1rem;color:#020617;}
.result{white-space:pre-wrap;margin-top:20px;background:#000;padding:25px;display:none;border-radius:8px;font-family: 'Courier New', monospace;font-size:0.85rem;border:1px solid var(--accent);line-height:1.4;}
label{font-size:0.7rem;color:var(--text);display:block;margin-bottom:3px;}
.settings-panel { background: #1e293b; padding: 15px; border-radius: 8px; border-left: 4px solid var(--pro); margin-top: 15px; }
.ac-group { border: 1px dashed var(--border); padding: 8px; border-radius: 4px; margin-top: 5px; }
.badge { background: var(--pro); color: #000; padding: 2px 6px; border-radius: 3px; font-size: 0.6rem; vertical-align: middle; margin-left: 10px; }
</style>
</head>
<body>

<header>
    <h1>VOLTMASTER PRO <span class="badge">PRO VERSION v1.2</span></h1>
    <p>Professional Electrical Design & Compliance Suite</p>
</header>

<div class="container">
    <div class="card">
        <h3>1. Project & Branding</h3>
        <div class="grid">
            <div><label>Company Name</label><input id="compName" placeholder="Volt Solutions Sdn Bhd" type="text"></div>
            <div><label>Prepared By</label><input id="prepBy" placeholder="Engineer Name" type="text"></div>
            <div><label>Project Ref</label><input id="projRef" placeholder="PROJ/2026/001" type="text"></div>
        </div>
    </div>

    <div class="settings-panel">
        <h3 style="color:var(--pro); border-color:var(--pro)">Pro Setting: Dynamic Pricing (RM)</h3>
        <div class="grid">
            <div><label>Light/Fan Pt</label><input id="rateL" value="85" type="number"></div>
            <div><label>Socket Point</label><input id="rateS" value="160" type="number"></div>
            <div><label>Aircond Point</label><input id="rateAC" value="250" type="number"></div>
            <div><label>Water Heater Pt</label><input id="rateWH" value="280" type="number"></div>
            <div><label>Outdoor Light Pt</label><input id="rateOL" value="120" type="number"></div>
            <div><label>DB Base Rate</label><input id="rateDB" value="650" type="number"></div>
        </div>
    </div>

    <div class="card">
        <h3>2. System Configuration</h3>
        <div class="grid">
            <div>
                <label>Supply System</label>
                <select id="phaseType">
                    <option value="1">1-Phase (230V)</option>
                    <option value="3">3-Phase (400V)</option>
                </select>
            </div>
            <div><label>Diversity (DF)</label><input id="pDF" value="0.8" step="0.1" type="number"></div>
            <div><label>Power Factor</label><input id="pPF" value="0.85" step="0.05" type="number"></div>
            <div>
                <label>Wiring Style</label>
                <select id="wireStyle">
                    <option value="surface">Surface</option>
                    <option value="concealed">Concealed</option>
                    <option value="conduit">Conduit</option>
                    <option value="trunking">Trunking</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>3. Load Quantities</h3>
        <div class="grid">
            <div><label>Lighting</label><input id="qL" value="10" type="number"></div>
            <div><label>Ceiling Fan</label><input id="qF" value="5" type="number"></div>
            <div><label>Exhaust Fan</label><input id="qEF" value="0" type="number"></div>
            <div><label>Socket Pts</label><input id="qS" value="12" type="number"></div>
            <div><label>Water Heater</label><input id="qWH" value="1" type="number"></div>
            <div><label>Outdoor Light</label><input id="qOL" value="2" type="number"></div>
        </div>
        <div class="grid">
            <div class="ac-group"><label>AC 1 (HP)</label><input id="hp1" value="1.0" step="0.5" type="number"><label>Qty</label><input id="qty1" value="1" type="number"></div>
            <div class="ac-group"><label>AC 2 (HP)</label><input id="hp2" value="1.5" step="0.5" type="number"><label>Qty</label><input id="qty2" value="0" type="number"></div>
            <div class="ac-group"><label>AC 3 (HP)</label><input id="hp3" value="2.5" step="0.5" type="number"><label>Qty</label><input id="qty3" value="0" type="number"></div>
        </div>
    </div>

    <div class="card">
        <h3>4. Technical Parameters</h3>
        <div class="grid">
            <div><label>Light (W)</label><input id="wL" value="15" type="number"></div>
            <div><label>Fan (W)</label><input id="wF" value="75" type="number"></div>
            <div><label>Exhaust (W)</label><input id="wEF" value="40" type="number"></div>
            <div><label>Outdoor (W)</label><input id="wOL" value="30" type="number"></div>
            <div><label>Heater (W)</label><input id="wWH" value="3000" type="number"></div>
            <div><label>Max. Length (m)</label><input id="cLen" value="30" type="number"></div>
        </div>
        <div class="grid">
            <div><label>Socket pts/Cct</label><select id="pS"><option value="2">2 (Radial)</option><option value="10">10 (Ring)</option></select></div>
        </div>
        <button onclick="calc()">GENERATE PRO COMPLIANCE REPORT</button>
        <div id="out" class="result"></div>
        <button style="background:#334155;color:white" onclick="pdf()">EXPORT 2-PAGE PDF</button>
    </div>
</div>

<script>
const breakers = [20, 32, 40, 63, 80, 100, 125];
const mvAM = { "1.5": 29, "2.5": 18, "4.0": 11, "6.0": 7.3, "10.0": 4.4, "16.0": 2.8, "25.0": 1.8 };

function getACSpecs(hp) {
    if (hp <= 1.5) return { mcb: "16A", cable: "2.5mm²" };
    if (hp <= 2.5) return { mcb: "20A", cable: "4.0mm²" };
    return { mcb: "32A", cable: "6.0mm²" };
}

function getDBRecommendation(ways, phase) {
    let size = ways <= 8 ? "12-Way" : ways <= 14 ? "18-Way" : ways <= 20 ? "24-Way" : ways <= 32 ? "36-Way" : "42-Way";
    let type = phase == "3" ? "Metal Enclosure (TPN)" : "PVC/Metal Enclosure (SPN)";
    return `${size} ${type}`;
}

function calc() {
    try {
        const getV = (id) => {
            const el = document.getElementById(id);
            return el ? (isNaN(parseFloat(el.value)) ? el.value : parseFloat(el.value)) : 0;
        };

        const phase = getV('phaseType');
        const wStyle = document.getElementById('wireStyle').value;
        const len = getV('cLen');
        
        let totalMCB = 0;
        let circuitLines = "";

        const addRow = (qty, label, ptsPerCct, mcb, cable) => {
            if (qty <= 0) return "";
            const circuits = Math.ceil(qty / ptsPerCct);
            totalMCB += circuits;
            return `${label}\n   - Qty: ${qty} | Circuits: ${circuits} | MCB: ${mcb} | Cable: ${cable}\n\n`;
        };

        circuitLines += addRow(getV('qL'), "A. LIGHTING", 10, "6A", "1.5mm²");
        circuitLines += addRow(getV('qF'), "B. CEILING FANS", 10, "10A", "1.5mm²");
        circuitLines += addRow(getV('qEF'), "C. EXHAUST FANS", 10, "10A", "1.5mm²");
        
        if(getV('qOL') > 0) {
            const cOL = Math.ceil(getV('qOL')/10); totalMCB += cOL;
            circuitLines += `D. OUTDOOR LIGHTING\n   - Qty: ${getV('qOL')} | Circuits: ${cOL} | MCB: 6A | Cable: 1.5mm² | RCD: 30mA\n\n`;
        }

        if(getV('qS') > 0) {
            const cS = Math.ceil(getV('qS') / getV('pS')); totalMCB += cS;
            circuitLines += `E. SOCKET OUTLET\n   - Qty: ${getV('qS')} | Circuits: ${cS} | MCB: ${getV('pS')==10?'32A':'20A'} | Cable: 4.0mm²\n\n`;
        }

        let acW = 0, acCount = 0, acRows = "";
        for(let i=1; i<=3; i++){
            let h = getV('hp'+i), q = getV('qty'+i);
            if(q > 0){
                acW += (h * 746 * q); totalMCB += q; acCount += q;
                let s = getACSpecs(h);
                acRows += `   - ${h}HP AC: MCB ${s.mcb} | Cable ${s.cable} | Qty: ${q}\n`;
            }
        }
        if(acCount > 0) circuitLines += `F. AIR-CONDITIONING\n${acRows}\n`;

        if(getV('qWH') > 0) {
            totalMCB += getV('qWH');
            circuitLines += `G. WATER HEATER\n   - Qty: ${getV('qWH')} | MCB: 20A | Cable: 4.0mm² | RCD: 10mA\n\n`;
        }

        const TCL = (getV('qL')*getV('wL')) + (getV('qF')*getV('wF')) + (getV('qEF')*getV('wEF')) + (getV('qS')*250) + acW + (getV('qWH')*getV('wWH')) + (getV('qOL')*getV('wOL'));
        const MD = TCL * getV('pDF');
        const Ib = (phase == "1") ? MD / (230 * getV('pPF')) : MD / (1.732 * 400 * getV('pPF'));

        const mainS = breakers.find(b => b >= (Ib * 1.25)) || 63;
        const mainCab = (mainS <= 32) ? 6 : (mainS <= 40) ? 10 : (mainS <= 63) ? 16 : 25;
        
        let earthCab = (mainCab <= 16) ? mainCab : (mainCab <= 35) ? 16 : (mainCab / 2);
        if (earthCab < 16 && phase == "3") earthCab = 16;

        const vDropPct = ((mvAM[mainCab.toFixed(1)] || 2.8) * Ib * len) / (phase == "1" ? 2300 : 4000);

        let mult = wStyle === 'concealed' ? 1.4 : wStyle === 'conduit' ? 1.25 : 1.0;
        let totalVal = (getV('qL')+getV('qF')+getV('qEF'))*getV('rateL')*mult + (getV('qS')*getV('rateS')*mult) + (acCount*getV('rateAC')*mult) + (getV('qWH')*getV('rateWH')*mult) + (getV('qOL')*getV('rateOL')*mult) + getV('rateDB');

        const dbRec = getDBRecommendation(totalMCB, phase);

        let report = `============================================================
              ${(getV('compName') || "VOLTMASTER PRO").toUpperCase()}
              OFFICIAL COMPLIANCE REPORT
============================================================
REF NO    : ${getV('projRef') || "PROJ-" + new Date().getTime()}
PREPARED BY: ${getV('prepBy') || "SYSTEM"}
DATE      : ${new Date().toLocaleDateString()}
SYSTEM    : ${phase}-PHASE | WIRING: ${wStyle.toUpperCase()}
------------------------------------------------------------
[1. CIRCUIT DETAILS]
------------------------------------------------------------
${circuitLines || "No active loads."}
[2. DB & PROTECTION]
------------------------------------------------------------
Main Switch    : ${mainS}A
Incoming Cable : ${mainCab}mm² (Cu/PVC)
Earth Cable    : ${earthCab}mm² (Green/Yellow)
Main RCD       : 63A / 100mA (Type A)
Total MCB Ways : ${totalMCB} + 25% Spare

[3. TECHNICAL RECOMMENDATIONS]
------------------------------------------------------------
Recommended DB : ${dbRec}
Enclosure Type : ${phase == "3" ? 'Surface/Flush Metal' : 'PVC/Metal'}
Earth System   : TT-System (Requirement)

[4. DESIGN SUMMARY]
------------------------------------------------------------
Total Connected Load (TCL) : ${(TCL/1000).toFixed(2)} kW
Maximum Demand (MD)        : ${(MD/1000).toFixed(2)} kW
Voltage Drop               : ${vDropPct.toFixed(2)}%
Status                     : ${vDropPct <= 4 ? 'PASSED' : 'NON-COMPLIANT'}

[5. ESTIMATED COMMERCIAL VALUATION]
------------------------------------------------------------
WIRING STYLE   : ${wStyle.toUpperCase()}
ESTIMATED TOTAL: RM ${totalVal.toLocaleString()}

*DISCLAIMER: 
This estimate is subject to actual site conditions and 
routing. Total excludes all appliances (AC units, heaters, 
fans, etc.), decorative fittings, and specific bulk 
material costs unless stated otherwise.*

Ref Standards: ST (Electricity Regulations 1994) / MS 1979
------------------------------------------------------------
------------------------------------------------------------`;

        document.getElementById('out').style.display = "block";
        document.getElementById('out').innerText = report;
    } catch (e) { alert(e.message); }
}

async function pdf() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF('p', 'mm', 'a4');
    const outEl = document.getElementById('out');
    if (!outEl.innerText) { alert("Generate report first!"); return; }

    const fullText = outEl.innerText;
    const splitKey = "[2. DB & PROTECTION]";
    const sections = fullText.split(splitKey);
    const p1 = sections[0].trim();
    const p2 = (splitKey + (sections[1] || "")).trim();

    const addHeaderFooter = (n) => {
        const c = document.getElementById('compName').value || "VOLTMASTER PRO";
        doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(34, 197, 94);
        doc.text(`${c.toUpperCase()} | TECHNICAL REPORT`, 15, 15);
        doc.setFontSize(8); doc.setTextColor(150);
        doc.text(`ST/IEC Standards Compliance | Page ${n} of 2`, 15, 285);
        doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 150, 285);
        doc.line(15, 18, 195, 18);
    };

    addHeaderFooter(1); doc.setFont("courier", "normal"); doc.setFontSize(9); doc.setTextColor(0,0,0);
    doc.text(doc.splitTextToSize(p1, 180), 15, 30);
    doc.addPage(); addHeaderFooter(2);
    doc.text(doc.splitTextToSize(p2, 180), 15, 30);
    doc.save("VoltMaster_Pro_v1.2_Report.pdf");
}
</script>
</body>
</html>
